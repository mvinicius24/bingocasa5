<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Conexão Direta NATIVA</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #f0f4f8; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        button { padding: 12px 24px; font-weight: bold; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #1d4ed8; }
        #resultado { margin-top: 20px; padding: 15px; border-radius: 4px; font-weight: bold; font-size: 14px; text-align: left; word-break: break-all; white-space: pre-wrap; }
        .sucesso { background: #dcfce7; color: #15803d; }
        .erro { background: #fee2e2; color: #b91c1c; }
        .tentando { background: #fef08a; color: #854d0e; }
    </style>
</head>
<body>

    <div class="box">
        <h3>Teste de Conexão Direta Nativa</h3>
        <p>Este teste usa a função nativa do navegador para forçar a resposta do banco.</p>
        
        <button onclick="testarConexaoForte()">Forçar Envio ao Banco</button>

        <div id="resultado">Aguardando clique...</div>
    </div>

    <script>
        async function testarConexaoForte() {
            const campoResultado = document.getElementById('resultado');
            campoResultado.className = 'tentando';
            campoResultado.innerText = "🚀 Enviando requisição direta...";

            const url = "https://afqrkodlfvqskbruwpwv.supabase.co/rest/v1/jogadores";
            const apiKey = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmcXJrb2RsZnZxc2ticnV3cHd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMzcwNjksImV4cCI6MjA5NzYxMzA2OX0.blx_CFfTLvlqwQ_UFumutULBXczDneVJ7nSDh-nWlDk";

            try {
                const resposta = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'apikey': apiKey,
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({
                        nome: "Teste Forçado Nativo",
                        status: "aguardando"
                    })
                });

                const dados = await resposta.json();

                if (!resposta.ok) {
                    campoResultado.className = 'erro';
                    campoResultado.innerText = "❌ O Banco Rejeitou!\n\n" + JSON.stringify(dados, null, 2);
                } else {
                    campoResultado.className = 'sucesso';
                    campoResultado.innerText = "✅ Perfeito! Conexão estabelecida.\n\nID Criado: " + dados[0].id;
                }

            } catch (erro) {
                console.error(erro);
                campoResultado.className = 'erro';
                campoResultado.innerText = "🚨 Erro de Rede/Bloqueio:\n O navegador impediu a saída dos dados. Erro: " + erro.message;
            }
        }
    </script>
</body>
</html>

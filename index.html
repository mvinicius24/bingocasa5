<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Casa 5</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ... (seu CSS permanece o mesmo) ... */
    </style>
</head>
<body>
    <script>
        // CONFIGURAÇÃO SUPABASE
        const SUPABASE_URL = 'https://jolstaqfbllfbtfljpjj.supabase.co';
        const SUPABASE_KEY = 'SUA_CHAVE_ANON_AQUI'; // <--- COLOQUE SUA CHAVE AQUI
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let cartelaGerada = [];

        async function gerarCartela() {
            const nome = document.getElementById('nomeJogador').value;
            if (!nome) return alert("Digite seu nome!");

            // Gera a estrutura da cartela antes de salvar
            cartelaGerada = gerarNumeros();

            // SALVA NO BANCO
            const { data, error } = await supabase
                .from('jogadores')
                .insert([{ nome: nome, cartela: cartelaGerada, liberado: false }]);

            if (error) return alert("Erro ao salvar: " + error.message);

            document.getElementById('area-jogo').style.display = 'none';
            document.getElementById('displayNome').innerText = nome;
            document.getElementById('area-espera').style.display = 'block';
        }

        function gerarNumeros() {
            let colunas = [[], [], [], [], []];
            for (let c = 0; c < 5; c++) {
                let nums = [];
                while(nums.length < 5) {
                    let n = Math.floor(Math.random() * 15) + (c * 15) + 1;
                    if(!nums.includes(n)) nums.push(n);
                }
                colunas[c] = nums;
            }
            return colunas;
        }

        // Função chamada quando o admin liberar no painel
        function simularLiberacao() {
            document.getElementById('area-espera').style.display = 'none';
            document.getElementById('area-cartela').style.display = 'block';
            renderizarCartela(cartelaGerada);
        }

        function renderizarCartela(colunas) {
            const grid = document.getElementById('gridCartela');
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    let ehCentro = (r === 2 && c === 2);
                    let val = ehCentro ? "★" : colunas[c][r];
                    const div = document.createElement('div');
                    div.className = ehCentro ? "celula centro marcado" : "celula";
                    div.innerText = val;
                    if (!ehCentro) div.onclick = function() { this.classList.toggle('marcado'); };
                    grid.appendChild(div);
                }
            }
        }
        
        // ... (resto do seu script de senha) ...
    </script>
</body>
</html>

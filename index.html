<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Casa 5</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        .admin-link { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .admin-link:hover { opacity: 1; }
        .ocultar { display: none; } /* Classe para esconder o cadeado */

        .container { text-align: center; width: 90%; max-width: 500px; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-img { width: 100%; max-width: 450px; margin: 0 auto 20px auto; }
        .logo-img img { width: 100%; height: auto; display: block; border-radius: 20px; }

        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-main { background-color: #ff4500; color: white; padding: 15px 40px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-main:hover { background-color: #e03e00; }

        #area-espera, #area-cartela { display: none; }
        
        /* Cartela Tradicional */
        .cartela-bingo { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 20px; }
        .header-col { font-weight: bold; color: #ff4500; font-size: 1.2rem; padding: 5px; }
        .celula { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border: 2px solid #ff4500; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1.2rem; }
        .celula.marcado { background-color: #ff4500; color: white; }
        .centro { background-color: #ddd; cursor: default; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 300px; }
    </style>
</head>
<body>

    <div id="cadeado" class="admin-link" onclick="document.getElementById('modal').style.display='flex'">🔒</div>

    <div class="container" id="area-jogo">
        <div class="logo-img"><img src="logo2.png" alt="Logo"></div>
        <input type="text" id="nomeJogador" placeholder="Digite seu nome">
        <button class="btn-main" onclick="gerarCartela()">Gerar Minha Cartela</button>
    </div>

    <div class="container" id="area-espera">
        <h3>Olá, <span id="displayNome"></span>!</h3>
        <p>Aguardando liberação do chamador...</p>
        <button class="btn-main" style="background-color: #28a745;" onclick="simularLiberacao()">Simular Liberação (Adm)</button>
    </div>

    <div class="container" id="area-cartela">
        <h3>Sua Cartela</h3>
        <div class="cartela-bingo" id="gridCartela">
            <div class="header-col">B</div><div class="header-col">I</div><div class="header-col">N</div><div class="header-col">G</div><div class="header-col">O</div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Admin</h3>
            <input type="password" id="senhaInput" placeholder="Senha">
            <button class="btn-main" onclick="validarSenha()">Entrar</button>
        </div>
    </div>

    <script>
        // Função utilitária para esconder/mostrar o cadeado
        function toggleCadeado(mostrar) {
            const cadeado = document.getElementById('cadeado');
            mostrar ? cadeado.classList.remove('ocultar') : cadeado.classList.add('ocultar');
        }

        function gerarCartela() {
            const nome = document.getElementById('nomeJogador').value;
            if (!nome) return alert("Digite seu nome!");
            
            toggleCadeado(false); // Esconde o cadeado
            document.getElementById('area-jogo').style.display = 'none';
            document.getElementById('displayNome').innerText = nome;
            document.getElementById('area-espera').style.display = 'block';
        }

        function simularLiberacao() {
            document.getElementById('area-espera').style.display = 'none';
            document.getElementById('area-cartela').style.display = 'block';
            montarCartela();
        }

        function montarCartela() {
            const grid = document.getElementById('gridCartela');
            let colunas = [[], [], [], [], []];

            for (let c = 0; c < 5; c++) {
                let min = (c * 15) + 1;
                let max = (c + 1) * 15;
                let nums = [];
                while(nums.length < 5) {
                    let n = Math.floor(Math.random() * (max - min + 1)) + min;
                    if(!nums.includes(n)) nums.push(n);
                }
                colunas[c] = nums.sort((a, b) => a - b);
            }

            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    let ehCentro = (r === 2 && c === 2);
                    const div = document.createElement('div');
                    div.className = ehCentro ? "celula centro marcado" : "celula";
                    div.innerText = ehCentro ? "★" : colunas[c][r];
                    if (!ehCentro) div.onclick = function() { this.classList.toggle('marcado'); };
                    grid.appendChild(div);
                }
            }
        }

        function validarSenha() {
            if (document.getElementById('senhaInput').value === "1234") window.location.href = "admin.html";
            else alert("Senha incorreta!");
        }
    </script>
</body>
</html>

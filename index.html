<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Bingo - Passo 1</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; background-color: #f0f4f8; color: #333;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        header {
            background-color: #1e3a8a; color: white; width: 100%; text-align: center;
            padding: 15px; font-size: 24px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .auth-box { 
            width: 95%; max-width: 400px; margin: 50px auto; text-align: center; 
            padding: 30px; background: white; border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; 
        }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; background: #3b82f6; color: white; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        .btn-alt { background: #64748b; margin-top: 10px; }
        .btn-alt:hover { background: #475569; }

        /* Estilo do botão do cadeado */
        .cadeado-btn {
            all: unset; position: absolute; top: 15px; right: 15px; 
            width: 36px; height: 36px; background: #f1f5f9; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border: 1px solid #e2e8f0; transition: all 0.2s;
        }
        .cadeado-btn:hover { background: #e2e8f0; transform: scale(1.05); }
        .cadeado-btn svg { width: 18px; height: 18px; fill: #64748b; }

        /* Elementos ocultos por padrão */
        .oculto { display: none; }
    </style>
</head>
<body>

    <header>🎰 Bingo Realtime</header>

    <div id="tela-jogador" class="auth-box">
        <button class="cadeado-btn" title="Área do Chamador" onclick="irParaAcessoChamador()">
            <svg viewBox="0 0 24 24">
                <path d="M12,17A2,2 0 0,0 14,15C14,13.89 13.1,13 12,13A2,2 0 0,0 10,15A2,2 0 0,0 12,17M18,8A2,2 0 0,1 20,10V20A2,2 0 0,1 18,22H6A2,2 0 0,1 4,20V10C4,8.89 4.9,8 6,8H7V6A5,5 0 0,1 12,1A5,5 0 0,1 17,6V8H18M12,3A3,3 0 0,0 9,6V8H15V6A3,3 0 0,0 12,3Z" />
            </svg>
        </button>

        <h3>Entrar no Bingo</h3>
        <input type="text" id="nome-jogador" placeholder="Digite seu nome para jogar">
        <button onclick="entrarComoJogador()">Pedir minha Cartela</button>
    </div>

    <div id="tela-senha-chamador" class="auth-box oculto">
        <h3>Painel de Controle</h3>
        <p style="font-size: 13px; color: #64748b; margin-top: -10px;">Acesso restrito ao organizador</p>
        <input type="password" id="senha-chamador" placeholder="Digite a senha de acesso">
        <button onclick="validarSenhaChamador()">Acessar Painel</button>
        <button onclick="voltarParaJogador()" class="btn-alt">Voltar</button>
    </div>

    <div id="tela-painel-chamador" class="auth-box oculto" style="max-width: 600px;">
        <h3 style="color: #10b981;">🎉 Sucesso! Você entrou no Painel</h3>
        <p>Esta é a área que o chamador verá após a senha ser validada.</p>
        <button onclick="voltarParaJogador()" class="btn-alt">Sair do Painel</button>
    </div>

    <script>
        // --- FUNÇÕES DE NAVEGAÇÃO DA INTERFACE ---
        function irParaAcessoChamador() {
            document.getElementById('tela-jogador').classList.add('oculto');
            document.getElementById('tela-senha-chamador').classList.remove('oculto');
        }

        function voltarParaJogador() {
            document.getElementById('tela-senha-chamador').classList.add('oculto');
            document.getElementById('tela-painel-chamador').classList.add('oculto');
            document.getElementById('tela-jogador').classList.remove('oculto');
        }

        function entrarComoJogador() {
            const nome = document.getElementById('nome-jogador').value.trim();
            if(!nome) return alert("Por favor, digite seu nome!");
            alert("Nome recebido: " + nome + "\n(A conexão com o banco faremos no próximo passo!)");
        }

        // --- PREPARAÇÃO DO SUPABASE (PROVISÓRIO) ---
        // Quando você me enviar as chaves, vamos substituir esses valores de teste pelos reais
        const SUPABASE_URL = "https://exemplo.supabase.co"; 
        const SUPABASE_KEY = "chave_provisoria_para_nao_travar";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Função de validação local temporária (Trocaremos pela consulta ao banco depois)
        function validarSenhaChamador() {
            const senhaDigitada = document.getElementById('senha-chamador').value;
            
            // Senha temporária só para testar a transição de telas localmente
            if(senhaDigitada === "1234") {
                document.getElementById('tela-senha-chamador').classList.add('oculto');
                document.getElementById('tela-painel-chamador').classList.remove('oculto');
            } else {
                alert("Senha inválida de teste! Use a senha: 1234");
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Conexão Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #f0f4f8; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        button { padding: 12px 24px; font-weight: bold; background: #22c55e; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #16a34a; }
        #resultado { margin-top: 20px; padding: 10px; border-radius: 4px; font-weight: bold; font-size: 14px; word-break: break-all; }
        .sucesso { background: #dcfce7; color: #15803d; }
        .erro { background: #fee2e2; color: #b91c1c; }
    </style>
</head>
<body>

    <div class="box">
        <h3>Teste de Conexão Direta</h3>
        <p>Clique no botão abaixo para tentar inserir um jogador chamado "Teste Conexão" no seu banco de dados.</p>
        
        <button onclick="executarTesteSalvar()">Testar Salvar no Banco</button>

        <div id="resultado">Aguardando teste...</div>
    </div>

    <script>
        // Suas credenciais oficiais configuradas
        const SUPABASE_URL = "https://afqrkodlfvqskbruwpwv.supabase.co"; 
        const SUPABASE_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmcXJrb2RsZnZxc2ticnV3cHd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMzcwNjksImV4cCI6MjA5NzYxMzA2OX0.blx_CFfTLvlqwQ_UFumutULBXczDneVJ7nSDh-nWlDk";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function ejecutarTesteSalvar() {
            const campoResultado = document.getElementById('resultado');
            campoResultado.className = '';
            campoResultado.innerText = "Tentando salvar...";

            // Tenta inserir um registro simples na tabela 'jogadores'
            const { data, error } = await supabaseClient
                .from('jogadores')
                .insert([{ nome: "Teste Conexão", status: "aguardando" }])
                .select();

            if (error) {
                console.error("Erro retornado:", error);
                campoResultado.className = 'erro';
                campoResultado.innerHTML = `❌ Falhou!<br>Mensagem: ${error.message}<br>Código: ${error.code}`;
            } else {
                campoResultado.className = 'sucesso';
                campoResultado.innerHTML = `✅ Sucesso! Dado gravado no banco.<br>ID do jogador criado: ${data[0].id}`;
            }
        }
    </script>
</body>
</html>

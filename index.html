<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Light Mode - Future Engine</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --accent-blue: #2563eb;
            --accent-green: #16a34a;
            --accent-red: #dc2626;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .neon-panel {
            width: 100%;
            max-width: 480px;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            border-radius: 16px;
            padding: 30px;
            display: none;
        }

        .neon-panel.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        h1, h2 { text-align: center; color: var(--accent-blue); }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-main { background: var(--accent-blue); color: #fff; }
        .btn-main:hover { background: #1d4ed8; transform: translateY(-2px); }
        .btn-red { background: var(--accent-red); color: #fff; }

        .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 20px; }
        .b-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 8px; font-weight: bold; cursor: pointer; }
        .b-cell.marked { background: var(--accent-green); color: white; border-color: var(--accent-green); }
        .b-cell.free { background: #f1f5f9; color: var(--text-muted); font-size: 10px; }

        .bola-display { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--accent-blue); display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; margin: 20px auto; color: var(--accent-blue); background: #eff6ff; }

        .list-container { max-height: 150px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-top: 10px; }
        .player-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid var(--border); font-size: 14px; }

        .painel-75 { display: grid; grid-template-columns: repeat(15, 1fr); gap: 2px; margin-top: 20px; }
        .p-bola { padding: 4px; border: 1px solid var(--border); text-align: center; font-size: 10px; border-radius: 4px; }
        .p-bola.active { background: var(--accent-blue); color: white; }
    </style>
</head>
<body>

    <div class="neon-panel active" id="view-inicial">
        <h1>BINGO FUTURE</h1>
        <input type="text" id="inputNome" placeholder="Seu nome...">
        <button class="btn-main" onclick="solicitarVagaJogador()">Entrar na Partida</button>
    </div>

    <div class="neon-panel" id="view-cartela">
        <h3 id="lbl-jogador-nome"></h3>
        <div id="lbl-bola-atual-jog" style="text-align: center; color: var(--accent-blue);">Aguardando...</div>
        <div class="bingo-grid" id="grid-cartela-corpo"></div>
        <button class="btn-red" style="margin-top:20px;" onclick="desistirDoJogoJogador()">Desistir</button>
    </div>

    <div class="neon-panel" id="view-chamador" style="max-width: 700px;">
        <h2>CONSOLE DO CHAMADOR</h2>
        <div class="bola-display" id="bola-principal">--</div>
        <button class="btn-main" onclick="rodarGloboAdmin()">Girar Globo</button>
        <button class="btn-red" style="margin-top: 10px;" onclick="encerrarPartidaGeral()">Encerrar Jogo (Apagar Tudo)</button>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div><h4>Jogadores</h4><div class="list-container" id="lista-atendidos"></div></div>
            <div><h4>Grade 1-75</h4><div class="painel-75" id="grade-75-bolas"></div></div>
        </div>
    </div>

    <script>
        const CONFIG = { URL: "https://jolstaqfbllfbtfljpjj.supabase.co/rest/v1", KEY: "sb_publishable_G65OxEEE9Q_EidJkQqlWGg_Go07ePJg" };
        let meId = null;
        let bolasListadasAdmin = [];

        function changeView(id) {
            document.querySelectorAll('.neon-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function solicitarVagaJogador() {
            const nome = document.getElementById('inputNome').value;
            if(!nome) return alert('Nome necessário');
            
            const c = Array.from({length:25}, () => Math.floor(Math.random()*75)+1); // Simplificado para demo
            const res = await fetch(`${CONFIG.URL}/jogadores`, {
                method: 'POST',
                headers: { 'apikey': CONFIG.KEY, 'Authorization': `Bearer ${CONFIG.KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
                body: JSON.stringify({ nome, cartela: c, liberado: true })
            });
            const data = await res.json();
            meId = data[0].id;
            changeView('view-cartela');
            setInterval(escutarBolasNoDispositivoJogador, 3000);
        }

        async function escutarBolasNoDispositivoJogador() {
            if(!meId) return;
            const res = await fetch(`${CONFIG.URL}/jogadores?id=eq.${meId}&select=id`, { headers: { 'apikey': CONFIG.KEY, 'Authorization': `Bearer ${CONFIG.KEY}` } });
            const data = await res.json();
            
            if(data.length === 0) {
                alert("Partida encerrada pelo chamador.");
                window.location.reload(); // Redirecionamento forçado
            }
        }

        async function encerrarPartidaGeral() {
            if(!confirm("Tem certeza? Todos os jogadores serão desconectados.")) return;
            
            // Apaga todos os jogadores
            await fetch(`${CONFIG.URL}/jogadores`, {
                method: 'DELETE',
                headers: { 'apikey': CONFIG.KEY, 'Authorization': `Bearer ${CONFIG.KEY}` }
            });
            
            // Reseta o jogo
            await fetch(`${CONFIG.URL}/jogo_status?id=eq.1`, {
                method: 'PATCH',
                headers: { 'apikey': CONFIG.KEY, 'Authorization': `Bearer ${CONFIG.KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ bola_atual: null, bolas_sorteadas: [] })
            });
            
            alert("Partida encerrada com sucesso.");
            window.location.reload();
        }

        // Adicione o resto das funções de jogo aqui...
    </script>
</body>
</html>

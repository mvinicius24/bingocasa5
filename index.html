<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Bingo - Minha Cartela</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; }
        .grid-jogador { display: grid; grid-template-columns: repeat(15, 1fr); gap: 5px; max-width: 600px; margin: auto; }
        .num { padding: 10px; border: 1px solid #ccc; background: white; border-radius: 4px; }
        .marcado { background: #ff4500; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Sua Cartela</h1>
    <div class="grid-jogador" id="gridJogador"></div>

    <script>
        const supabase = supabase.createClient('https://jolstaqfbllfbtfljpjj.supabase.co', 'SUA_CHAVE_ANON_AQUI');

        // Renderiza grid 1-75
        const grid = document.getElementById('gridJogador');
        for(let i=1; i<=75; i++) grid.innerHTML += `<div class="num" id="j-${i}">${i}</div>`;

        // Escuta o sorteio em tempo real
        supabase
          .channel('sorteios')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'sorteios' }, payload => {
            const numero = payload.new.numero_sorteado;
            document.getElementById('j-' + numero).classList.add('marcado');
          })
          .subscribe();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Light - Future Engine</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --accent-blue: #2563eb;
            --accent-green: #16a34a;
            --accent-red: #dc2626;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .neon-panel { width: 100%; max-width: 480px; background: var(--panel-bg); border: 1px solid var(--border); box-shadow: var(--shadow); border-radius: 16px; padding: 30px; display: none; }
        .neon-panel.active { display: block; }

        h1 { text-align: center; color: var(--accent-blue); }
        input { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 600; text-transform: uppercase; cursor: pointer; margin-bottom: 10px; }
        .btn-main { background: var(--accent-blue); color: #fff; }
        .btn-red { background: var(--accent-red); color: #fff; }

        /* Estilo do Cadeado */
        .cadeado-area { border-top: 1px solid var(--border); margin-top: 30px; padding-top: 20px; text-align: center; }
        .icon-lock { font-size: 24px; cursor: pointer; color: var(--text-muted); }
        
        .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 20px; }
        .b-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 8px; font-weight: bold; }
        .b-cell.marked { background: var(--accent-green); color: white; }
    </style>
</head>
<body>

    <div class="neon-panel active" id="view-inicial">
        <h1>BINGO FUTURE</h1>
        <input type="text" id="inputNome" placeholder="Seu nome...">
        <button class="btn-main" onclick="solicitarVagaJogador()">Entrar na Partida</button>

        <div class="cadeado-area">
            <span class="icon-lock" onclick="toggleCadeado()">🔒</span>
            <div id="boxCadeado" style="display: none; margin-top: 15px;">
                <input type="password" id="inputSenhaCadeado" placeholder="Senha do Administrador">
                <button class="btn-main" onclick="validarAcessoChamador()">Acessar Painel</button>
            </div>
        </div>
    </div>

    <div class="neon-panel" id="view-cartela">
        <h3 id="lbl-jogador-nome">Sua Cartela</h3>
        <div id="lbl-bola-atual-jog" style="text-align: center; color: var(--accent-blue);">Aguardando...</div>
        <div class="bingo-grid" id="grid-cartela-corpo"></div>
        <button class="btn-red" onclick="desistirDoJogoJogador()">Desistir</button>
    </div>

    <div class="neon-panel" id="view-chamador">
        <h2>CONSOLE ADMIN</h2>
        <button class="btn-red" onclick="encerrarPartidaGeral()">Encerrar Partida (Apagar Todos)</button>
    </div>

    <script>
        const CONFIG = { URL: "https://jolstaqfbllfbtfljpjj.supabase.co/rest/v1", KEY: "sb_publishable_G65OxEEE9Q_EidJkQqlWGg_Go07ePJg" };
        let meId = null;

        function changeView(id) {
            document.querySelectorAll('.neon-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toggleCadeado() {
            const box = document.getElementById('boxCadeado');
            box.style.display = box.style.display === 'none' ? 'block' : 'none';
        }

        async function validarAcessoChamador() {
            const senha = document.getElementById('inputSenhaCadeado').value;
            // Validação simples (substitua pela sua lógica de checagem)
            if(senha === "1234") { 
                changeView('view-chamador');
            } else {
                alert("Senha incorreta");
            }
        }

        async function encerrarPartidaGeral() {
            if(!confirm("Isso excluirá todos os jogadores da partida. Continuar?")) return;
            
            // Apaga todos os jogadores da base
            await fetch(`${CONFIG.URL}/jogadores`, {
                method: 'DELETE',
                headers: { 'apikey': CONFIG.KEY, 'Authorization': `Bearer ${CONFIG.KEY}` }
            });
            
            alert("Partida encerrada e jogadores removidos.");
            window.location.reload();
        }

        async function solicitarVagaJogador() {
            // Lógica de entrada...
            alert("Entrando na partida...");
            changeView('view-cartela');
        }
    </script>
</body>
</html>

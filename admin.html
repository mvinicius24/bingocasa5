<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Bingo Casa 5</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Mantenha o mesmo CSS que já havíamos definido anteriormente */
        .globo { width: 160px; height: 160px; background: #ff4500; border-radius: 50%; position: relative; margin: 0 auto 20px auto; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .bola-pequena { position: absolute; width: 10px; height: 10px; background: white; border-radius: 50%; opacity: 0.8; }
        .agitando .bola-pequena { animation: shake 0.1s infinite, flutuar 0.8s infinite ease-in-out; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(1px, 1px); } }
        @keyframes flutuar { 0% { transform: translate(0, 0); } 50% { transform: translate(10px, -10px); } 100% { transform: translate(0, 0); } }
        .btn-sortear { background: #28a745; color: white; padding: 15px; border-radius: 50px; width: 100%; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div style="max-width: 600px; margin: auto; padding: 20px;">
        <div class="globo" id="globoContainer"><div id="bolinhasInternas"></div><div id="displayNumero" style="font-size: 50px; color: white; z-index: 10;">--</div></div>
        <button class="btn-sortear" onclick="sortear()">Sortear Número</button>
    </div>

    <script>
        const supabase = supabase.createClient('https://jolstaqfbllfbtfljpjj.supabase.co', 'SUA_CHAVE_ANON_AQUI');
        let bolasNoGlobo = Array.from({length: 75}, (_, i) => i + 1);

        // (Insira aqui a função popularGlobo que criamos anteriormente)

        async function sortear() {
            let num = bolasNoGlobo.splice(Math.floor(Math.random() * bolasNoGlobo.length), 1)[0];
            
            // Envia para o Supabase
            const { error } = await supabase.from('sorteios').insert([{ numero_sorteado: num }]);
            
            if (!error) {
                document.getElementById('displayNumero').innerText = num;
                // Animações aqui...
            }
        }
    </script>
</body>
</html>

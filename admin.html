<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Bingo Casa 5</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; padding: 10px; margin: 0; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        
        /* Globo Visual */
        .globo { width: 160px; height: 160px; background: #ff4500; border-radius: 50%; position: relative; margin: 0 auto 20px auto; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .bola-pequena { position: absolute; width: 10px; height: 10px; background: white; border-radius: 50%; opacity: 0.8; }
        #displayNumero { font-size: 50px; color: white; font-weight: bold; z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(1px, 1px); }
        }
        @keyframes flutuar {
            0% { transform: translate(0, 0); }
            50% { transform: translate(10px, -10px); }
            100% { transform: translate(0, 0); }
        }
        .agitando .bola-pequena { animation: shake 0.1s infinite, flutuar 0.8s infinite ease-in-out; }

        .btn-sortear { background: #28a745; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; margin-bottom: 20px; }
        .btn-sortear:disabled { background: #ccc; cursor: not-allowed; }
        
        .painel-jogadores { margin-top: 30px; margin-bottom: 30px; }
        .jogador-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .btn-liberar { background: #007bff; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        
        .header-numeros { display: flex; flex-direction: column; gap: 10px; border-top: 2px solid #eee; padding-top: 20px; margin-top: 20px; }
        .stats { display: flex; justify-content: space-between; font-weight: bold; }
        .grid-numeros { display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 5px; margin-top: 15px; }
        .num-bola { height: 35px; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 14px; font-weight: bold; }
        .num-bola.sorteado { background: #ff4500; color: white; }
    </style>
</head>
<body>
    <audio id="audioSorteio" src="bingo_sound.mp3" loop></audio>
    <div class="container">
        <h1>Painel do Chamador</h1>
        
        <div class="globo" id="globoContainer">
            <div id="bolinhasInternas"></div>
            <div id="displayNumero">--</div>
        </div>
        
        <button class="btn-sortear" onclick="sortear()">Sortear Número</button>

        <div class="painel-jogadores">
            <h2>Pedidos de Cartela</h2>
            <div id="listaJogadores">
                <div class="jogador-item">
                    <span>Jogador Exemplo</span>
                    <button class="btn-liberar" onclick="liberarJogador(this)">Liberar</button>
                </div>
            </div>
        </div>

        <div class="header-numeros">
            <div class="stats">
                <span>Chamados: <span id="contadorSorteados">0</span></span>
                <span>No Globo: <span id="contadorRestantes">75</span></span>
            </div>
        </div>
        <div class="grid-numeros" id="gridNumeros"></div>
    </div>

    <script>
        let bolasNoGlobo = Array.from({length: 75}, (_, i) => i + 1);

        function popularGlobo() {
            const container = document.getElementById('bolinhasInternas');
            for(let i=0; i<75; i++) {
                let b = document.createElement('div');
                b.className = 'bola-pequena';
                b.style.left = (Math.random() * 140) + 'px';
                b.style.top = (Math.random() * 140) + 'px';
                b.style.animationDelay = (Math.random() * 2) + 's';
                container.appendChild(b);
            }
        }
        popularGlobo();

        const grid = document.getElementById('gridNumeros');
        for(let i=1; i<=75; i++) grid.innerHTML += `<div class="num-bola" id="n-${i}">${i}</div>`;

        function sortear() {
            if(bolasNoGlobo.length === 0) return alert("Fim de jogo!");
            
            const btn = document.querySelector('.btn-sortear');
            const container = document.getElementById('globoContainer');
            const som = document.getElementById('audioSorteio');
            
            btn.disabled = true;
            container.classList.add('agitando');
            som.currentTime = 0;
            som.play();

            let contador = 0;
            let intervalo = setInterval(() => {
                document.getElementById('displayNumero').innerText = Math.floor(Math.random() * 75) + 1;
                contador++;
                if (contador >= 20) {
                    clearInterval(intervalo);
                    som.pause();
                    container.classList.remove('agitando');
                    finalizarSorteio();
                }
            }, 100);
        }

        function finalizarSorteio() {
            let num = bolasNoGlobo.splice(Math.floor(Math.random() * bolasNoGlobo.length), 1)[0];
            document.getElementById('displayNumero').innerText = num;
            document.getElementById('n-' + num).classList.add('sorteado');
            
            const container = document.getElementById('bolinhasInternas');
            if(container.lastChild) container.removeChild(container.lastChild);
            
            document.getElementById('contadorSorteados').innerText = (75 - bolasNoGlobo.length);
            document.getElementById('contadorRestantes').innerText = bolasNoGlobo.length;
            
            document.querySelector('.btn-sortear').disabled = false;
        }

        function liberarJogador(btn) {
            btn.innerText = "Liberado";
            btn.disabled = true;
            btn.style.backgroundColor = "#28a745";
        }
    </script>
</body>
</html>
